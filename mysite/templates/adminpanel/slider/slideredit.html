{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Skydash Admin</title>
    <!-- plugins:css -->
    <link rel="stylesheet" href="{% static 'adin/assets/vendors/feather/feather.css' %}">
    <link rel="stylesheet" href="{% static 'adin/assets/vendors/ti-icons/css/themify-icons.css' %}">
    <link rel="stylesheet" href="{% static 'adin/assets/vendors/css/vendor.bundle.base.css' %}">
    <link rel="stylesheet" href="{% static 'adin/assets/vendors/font-awesome/css/font-awesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'adin/assets/vendors/mdi/css/materialdesignicons.min.css' %}">
    <!-- endinject -->
    <!-- Plugin css for this page -->
    <!-- <link rel="stylesheet" href="{% static 'adin/assets/vendors/datatables.net-bs4/dataTables.bootstrap4.css' %}"> -->
    <link rel="stylesheet" href="{% static 'adin/assets/vendors/datatables.net-bs5/dataTables.bootstrap5.css' %}">
    <link rel="stylesheet" href="{% static 'adin/assets/vendors/ti-icons/css/themify-icons.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'adin/assets/js/select.dataTables.min.css' %}">
    <!-- End plugin css for this page -->
    <!-- inject:css -->
    <link rel="stylesheet" href="{% static 'adin/assets/css/style.css' %}">
    <!-- endinject -->
    <link rel="shortcut icon" href="{% static 'adin/assets/images/favicon.png' %}" />
</head>

<body>
    <div class="container-scroller">
        
        <!-- partial:partials/_navbar.html -->
        <nav class="navbar col-lg-12 col-12 p-0 fixed-top d-flex flex-row">
            <div class="text-center navbar-brand-wrapper d-flex align-items-center justify-content-start">
                <a class="navbar-brand brand-logo me-5" href="{% url 'adminindex' %}"><img src="{% static 'adin/assets/images/logo.svg' %}" class="me-2"
                        alt="logo" /></a>
                <a class="navbar-brand brand-logo-mini" href="{% url 'adminindex' %}"><img src="{% static 'adin/assets/images/logo-mini.svg' %}"
                        alt="logo" /></a>
            </div>
            <div class="navbar-menu-wrapper d-flex align-items-center justify-content-end">
                <button class="navbar-toggler navbar-toggler align-self-center" type="button" data-toggle="minimize">
                    <span class="icon-menu"></span>
                </button>
                
                <ul class="navbar-nav navbar-nav-right">
                    
                    <li class="nav-item nav-profile dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown" id="profileDropdown">
                            <img src="{% static 'adin/assets/images/faces/face28.jpg' %}" alt="profile" />
                        </a>
                        {% if user.is_authenticated %}
                        <div class="dropdown-menu dropdown-menu-right navbar-dropdown"
                            aria-labelledby="profileDropdown">
                           
                            <a class="dropdown-item" href="{% url 'logout_ad' %}">
                                <i class="ti-power-off text-primary"></i> Logout </a>
                        </div>
                        {% endif %}
                    </li>
                    <li class="nav-item nav-settings d-none d-lg-flex">
                        <a class="nav-link" href="#">
                            <i class="icon-ellipsis"></i>
                        </a>
                    </li>
                </ul>
                <button class="navbar-toggler navbar-toggler-right d-lg-none align-self-center" type="button"
                    data-toggle="offcanvas">
                    <span class="icon-menu"></span>
                </button>
            </div>
        </nav>
        <!-- partial -->
        <div class="container-fluid page-body-wrapper">
            <!-- partial:partials/_sidebar.html -->
            <nav class="sidebar sidebar-offcanvas" id="sidebar">
                <ul class="nav">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'adminindex' %}">
                            <i class="icon-grid menu-icon"></i>
                            <span class="menu-title">Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'slider' %}"
                            aria-controls="ui-basic">
                            <i class="icon-layout menu-icon"></i>
                            <span class="menu-title">Slider</span>
                            
                        </a>
                        
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-bs-toggle="collapse" href="#form-elements" aria-expanded="false"
                            aria-controls="form-elements">
                            <i class="icon-columns menu-icon"></i>
                            <span class="menu-title">Form elements</span>
                            <i class="menu-arrow"></i>
                        </a>
                        <div class="collapse" id="form-elements">
                            <ul class="nav flex-column sub-menu">
                                <li class="nav-item"><a class="nav-link" href="pages/forms/basic_elements.html">Basic
                                        Elements</a></li>
                            </ul>
                        </div>
                    </li>
                   
                   
                   
                    
                </ul>
            </nav>
            <!-- partial -->
           <div class="main-panel">
    <div class="content-wrapper">
       
        <h1 style="margin-bottom:20px; font-weight:bold;">
            SLIDER Edit
        </h1>

      <form action="" method="POST" 
      style="max-width:500px; background:#ffffff; padding:25px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.08);">

    {% csrf_token %}

    <label style="font-weight:600;">Name</label><br>
    <input type="text" name="name" value="{{slider.name}}"
           style="width:100%; padding:8px; margin-top:5px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px;">
    <label style="font-weight:600;">Image</label><br>
{% if slider.img %}
    <img src="{{ slider.img.url }}" alt="Slider Image" 
         style="width:150px; display:block; margin-bottom:10px; border-radius:5px;">
{% endif %}
<input type="file" name="img"
       style="width:100%; padding:8px; margin-top:5px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px;">
    <label style="font-weight:600;">Sale</label><br>
    <input type="number" name="sale" value="{{slider.sale}}"
           style="width:100%; padding:8px; margin-top:5px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px;">

    <label style="font-weight:600;">Discount</label><br>
    <input type="number" name="discount" value="{{slider.discount}}"
           style="width:100%; padding:8px; margin-top:5px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px;">

    <label style="font-weight:600;">Discount Deal</label><br>
    <select name="discount_deal"
            style="width:100%; padding:8px; margin-top:5px; margin-bottom:20px; border:1px solid #ccc; border-radius:5px;">

        <option value="NEW ARRIVAL" 
            {% if slider.discount_deal == "NEW ARRIVAL" %}selected{% endif %}>
            NEW ARRIVAL
        </option>

        <option value="HOT DEALS" 
            {% if slider.discount_deal == "HOT DEALS" %}selected{% endif %}>
            HOT DEALS
        </option>

    </select>

    <button type="submit"
            style="background:#2563eb; color:white; padding:10px 20px; border:none; border-radius:6px; cursor:pointer; font-weight:600;">
        💾 Save
    </button>

</form>

           

    </div>

    <footer class="footer">
    </footer>

</div>
            <!-- main-panel ends -->
        </div>
        <!-- page-body-wrapper ends -->
    </div>
    <!-- container-scroller -->
    <!-- plugins:js -->
    <script src="{% static 'adin/assets/vendors/js/vendor.bundle.base.js' %}"></script>
    <!-- endinject -->
    <!-- Plugin js for this page -->
    <script src="{% static 'adin/assets/vendors/chart.js/chart.umd.js' %}"></script>
    <script src="{% static 'adin/assets/vendors/datatables.net/jquery.dataTables.js' %}"></script>
    <!-- <script src="{% static 'adin/assets/vendors/datatables.net-bs4/dataTables.bootstrap4.js' %}"></script> -->
    <script src="{% static 'adin/assets/vendors/datatables.net-bs5/dataTables.bootstrap5.js' %}"></script>
    <script src="{% static 'adin/assets/js/dataTables.select.min.js' %}"></script>
    <!-- End plugin js for this page -->
    <!-- inject:js -->
    <script src="{% static 'adin/assets/js/off-canvas.js' %}"></script>
    <script src="{% static 'adin/assets/js/template.js' %}"></script>
    <script src="{% static 'adin/assets/js/settings.js' %}"></script>
    <script src="{% static 'adin/assets/js/todolist.js' %}"></script>
    <!-- endinject -->
    <!-- Custom js for this page-->
    <script src="{% static 'adin/assets/js/jquery.cookie.js' %}" type="text/javascript"></script>
    <script src="{% static 'adin/assets/js/dashboard.js' %}"></script>
    <!-- <script src="assets/js/Chart.roundedBarCharts.js"></script> -->
    <!-- End custom js for this page-->
</body>

</html>
